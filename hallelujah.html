<!DOCTYPE html>

<html>
    <head>
        <title>Hallelujah</title>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href = "style.css">

        <script>
            window.addEventListener('load', function () {
                let currpage = 1
                page = document.getElementById("image-holder");
                console.log(page)
                function nextpage(){
                    if(currpage==13) return;
                    if(currpage==8) currpage+=2;
                    else currpage += 1;
                    console.log(currpage)
                    page.innerHTML = "<img src = './assets/art/comic/page"+ currpage.toString() + ".png' style= 'max-width:100%;'>";
                    console.log("ok!")
                }
                function prevpage(){
                    if(currpage==1) return;
                    if(currpage==10) currpage-=1;
                    else currpage-=1;

                    page.innerHTML = "<img src = './assets/art/comic/page"+ currpage.toString() + ".png' style= 'max-width:100%;'>";
                }
                document.getElementById("left-arrow").onclick = prevpage;
                document.getElementById("right-arrow").onclick = nextpage;
            })
            
        </script>
    </head>
    <body>
        <div class = "section">
            <div id="arrow-holder">
                <div class = "arrow" id = "left-arrow"> Back</div>
                <div class = "arrow" id = "right-arrow"> Next</div>
            </div> 
            <div id = "image-holder" style="width:500px;">
                <img src = './assets/art/comic/page1.png' style="max-width:100%">
            </div>
            
        </div>
    </body>
</html>
